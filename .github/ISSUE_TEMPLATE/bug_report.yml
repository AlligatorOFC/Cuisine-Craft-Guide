name: "🐛 Bug Report"
description: "Report a bug in Cuisine Craft"
title: "[BUG] "
labels: ["bug"]

body:
  - type: textarea
    id: description
    attributes:
      label: "🧾 What happened?"
      description: "Describe the bug clearly."
      placeholder: "Something is not working..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "🔁 Steps to reproduce"
      description: "How can we reproduce this bug?"
      placeholder: |
        1. Do this
        2. Do that
        3. Bug happens
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "✅ Expected behavior"
      description: "What should happen instead?"
      placeholder: "It should work like..."
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "📦 Addon version"
      placeholder: "e.g. 1.7.0"
    validations:
      required: true

  - type: input
    id: mc_version
    attributes:
      label: "🎮 Minecraft version"
      placeholder: "e.g. 1.20.80"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: "📸 Screenshots / Videos"
      description: "If possible, add images or videos"
